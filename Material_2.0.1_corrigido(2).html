<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
<title>Inglês da Vida Real · A0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   INGLÊS DA VIDA REAL · A0  —  arquivo único, data-driven
   Edite só o array LESSONS lá embaixo pra criar/ajustar aulas.
   ============================================================ */
:root{
  --ink:#1F1B2E;        /* texto / cards escuros (plum-tinta) */
  --ink-soft:#5A5368;   /* texto secundário */
  --paper:#FBF7F2;      /* fundo papel quente */
  --card:#FFFFFF;
  --rose:#C75B7A;       /* acento principal */
  --rose-deep:#A8345A;
  --rose-tint:#F7E9EE;
  --gold:#E0A458;       /* secundário / disponível */
  --gold-tint:#F8EEDD;
  --sage:#6E8B7B;       /* concluído / sucesso */
  --sage-tint:#E6EEE9;
  --line:#E9DFD4;
  --shadow:0 10px 30px -12px rgba(31,27,46,.18);
  --radius:18px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:'Inter',system-ui,sans-serif;color:var(--ink);
  background:var(--paper);
  background-image:linear-gradient(rgba(31,27,46,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(31,27,46,.025) 1px,transparent 1px);
  background-size:26px 26px;
  line-height:1.55;-webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Fraunces',Georgia,serif}
.hand{font-family:'Caveat',cursive}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1040px;margin:0 auto;padding:0 22px}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:rgba(251,247,242,.86);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;gap:16px;height:84px}
.mark{display:flex;align-items:center;gap:9px}
.mark .logo-img{height:58px;width:auto;display:block}
.level-badge{background:var(--ink);color:#fff;font-family:'Inter';font-weight:700;font-size:11px;
  letter-spacing:.12em;padding:5px 10px;border-radius:7px}
.progress-mini{flex:1;display:flex;align-items:center;gap:10px;max-width:360px}
.bar{flex:1;height:7px;background:var(--rose-tint);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--gold));
  border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.pct{font-size:12px;font-weight:700;color:var(--rose-deep);min-width:34px;text-align:right}
.reset{margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;transition:.2s}
.reset:hover{border-color:var(--rose);color:var(--rose-deep)}

/* ---------- HOME / trilha ---------- */
.hero{position:relative;background:var(--ink);border-radius:28px;overflow:hidden;margin:26px 0 18px;
  display:grid;grid-template-columns:1fr 1.1fr;align-items:center;min-height:420px}
.hero-copy{position:relative;z-index:3;padding:30px 20px 30px 36px}
.eyebrow{display:inline-block;background:var(--gold);color:var(--ink);font-size:12px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;padding:6px 13px;border-radius:99px;margin-bottom:16px}
.hero h1{font-size:clamp(28px,4.2vw,42px);line-height:1.05;margin:.1em 0 .3em;letter-spacing:-.02em;color:#fff}
.hero h1 .hl{color:var(--rose-tint);text-decoration:underline;text-decoration-color:var(--rose);
  text-decoration-thickness:5px;text-underline-offset:5px}
.hero .sub{font-size:15.5px;color:#D8D2E0;max-width:42ch;margin-bottom:18px}
.hero .note{font-family:'Caveat';font-size:21px;color:var(--rose-tint);display:inline-block;margin-left:14px}
.hero-cta{display:inline-flex;align-items:center;gap:9px;background:var(--rose);color:#fff;font-weight:800;
  font-size:14.5px;padding:13px 22px;border-radius:99px;box-shadow:0 14px 30px -10px rgba(199,91,122,.55)}
.hero-art{position:relative;height:100%;min-height:420px}
.hero-art svg{position:absolute;inset:0;width:100%;height:100%}
.hero-art .wm{position:absolute;top:18px;right:-24px;width:280px;opacity:.1;transform:rotate(-4deg);z-index:1}
@media (max-width:760px){.hero{grid-template-columns:1fr;border-radius:20px}
  .hero-art{min-height:240px;order:-1}.hero-copy{padding:26px 18px}}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;padding:18px 0 70px}
.chunk{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;text-align:left;transition:transform .18s,box-shadow .18s,border-color .18s;
  display:flex;flex-direction:column;min-height:230px;width:100%;padding:0}
.chunk:not(.locked):hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--rose)}
.chunk .art{height:96px;display:flex;align-items:center;justify-content:center}
.chunk .art svg{width:46px;height:46px}
.chunk .body{padding:18px 20px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
.chunk .num{position:absolute;top:12px;left:14px;width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;font-family:'Fraunces';font-weight:700;font-size:14px;
  background:var(--ink);color:#fff;border:3px solid var(--paper);z-index:2}
.chunk.done .num{background:var(--sage)}
.chunk.open .num{background:var(--rose)}
.chunk .tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-top:4px}
.chunk h3{font-size:19px;line-height:1.2;margin:0;letter-spacing:-.01em}
.chunk .cando{font-size:13.5px;color:var(--ink-soft);margin-top:auto}
.chunk .cando b{color:var(--ink);font-weight:600}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;
  padding:5px 10px;border-radius:99px;width:fit-content}
.pill.lock{background:#F0EBE4;color:#9A8F84}
.pill.go{background:var(--gold-tint);color:#9A6A1E}
.pill.ok{background:var(--sage-tint);color:#3F6152}
.chunk.locked{opacity:.62;cursor:not-allowed;background:#FBF8F4}
.chunk.locked:hover{border-color:var(--line)}
.chunk.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.stamp{position:absolute;top:14px;right:14px;font-family:'Caveat';font-weight:700;font-size:18px;
  color:var(--sage);transform:rotate(7deg);opacity:0;transition:.3s;z-index:2}
.chunk.done .stamp{opacity:1}

/* ---------- LESSON view ---------- */
.lesson{display:none;padding:18px 0 90px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.back{display:inline-flex;align-items:center;gap:7px;border:none;background:none;color:var(--rose-deep);
  font-weight:600;font-size:14px;padding:6px 0;margin-bottom:8px}
.back:hover{text-decoration:underline}
.l-head{border-bottom:2px solid var(--line);padding-bottom:20px;margin-bottom:8px}
.l-head .tag{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.l-head h2{font-size:clamp(26px,4.5vw,38px);line-height:1.08;margin:.1em 0 .35em;letter-spacing:-.02em}
.obj{display:flex;flex-wrap:wrap;gap:8px 22px;font-size:14px}
.obj div{display:flex;gap:8px;align-items:baseline}
.obj .k{font-weight:700;color:var(--rose-deep);white-space:nowrap}
.obj .en{font-style:italic;color:var(--ink-soft)}

/* ---------- LESSON BANNER ---------- */
.l-banner{position:relative;background:var(--ink);border-radius:22px;overflow:hidden;
  display:grid;grid-template-columns:1fr 1fr;align-items:center;min-height:220px;margin-bottom:28px}
.l-banner-copy{position:relative;z-index:3;padding:28px 20px 28px 32px;display:flex;flex-direction:column;gap:10px}
.l-banner-copy img.blogo{height:44px;width:auto;display:block;opacity:.92}
.l-banner-copy .btag{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.l-banner-copy h2{font-family:'Fraunces',Georgia,serif;font-size:clamp(20px,3vw,28px);
  line-height:1.08;margin:0;letter-spacing:-.02em;color:#fff}
.l-banner-art{position:relative;height:100%;min-height:220px}
.l-banner-art svg{position:absolute;inset:0;width:100%;height:100%}
.l-obj{display:flex;flex-wrap:wrap;gap:8px 22px;font-size:14px;padding:0 0 20px;border-bottom:2px solid var(--line);margin-bottom:8px}
.l-obj div{display:flex;gap:8px;align-items:baseline}
.l-obj .k{font-weight:700;color:var(--rose-deep);white-space:nowrap}
.l-obj .en{font-style:italic;color:var(--ink-soft)}
@media(max-width:640px){.l-banner{grid-template-columns:1fr;border-radius:16px}
  .l-banner-art{min-height:140px}.l-banner-copy{padding:22px 18px 16px}}

section.block{margin-top:30px}
.b-label{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.b-label .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;
  background:var(--rose-tint);color:var(--rose-deep);flex:none}
.b-label h3{font-size:20px;margin:0;letter-spacing:-.01em}
.b-label .hint{font-size:13px;color:var(--ink-soft);margin-left:auto;font-style:italic}

/* revisão ribbon */
.review{background:linear-gradient(180deg,var(--gold-tint),#FBF4E6);border:1px dashed #E2BE80;
  border-radius:14px;padding:16px 18px}
.review .rt{font-weight:700;font-size:13px;color:#9A6A1E;letter-spacing:.04em;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.review p{margin:.2em 0 .6em;font-size:13.5px;color:#7A5A22}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:1px solid #E7CFA0;color:#8A5E1E;font-size:13px;font-weight:600;
  padding:6px 12px;border-radius:99px}

/* warmup / generic prose card */
.card-soft{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.card-soft p{margin:.3em 0}

/* vocab */
.vocab{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.vcard{background:var(--ink);color:#fff;border-radius:14px;padding:16px 14px;text-align:center;
  cursor:pointer;transition:.2s;user-select:none;min-height:74px;display:grid;place-items:center}
.vcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.vcard .en{font-family:'Fraunces';font-weight:600;font-size:18px}
.vcard .pt{display:none;color:var(--gold);font-size:15px;font-weight:600}
.vcard.flip{background:var(--rose)}
.vcard.flip .en{display:none}
.vcard.flip .pt{display:block;color:#fff}
.flip-hint{font-size:12px;color:var(--ink-soft);font-style:italic;margin-top:8px}

/* frases prontas */
.phrases{display:flex;flex-direction:column;gap:10px}
.ph{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
  border-left:4px solid var(--rose);border-radius:12px;padding:13px 16px}
.ph .en{font-family:'Fraunces';font-weight:600;font-size:17px;color:var(--ink)}
.ph .pt{font-size:13.5px;color:var(--ink-soft)}
.ph .say{margin-left:auto;flex:none;border:1px solid var(--line);background:#fff;border-radius:9px;
  font-size:12px;font-weight:600;color:var(--rose-deep);padding:6px 10px;align-self:center}
.ph .say:hover{background:var(--rose-tint)}

/* steps */
.steps{counter-reset:s;display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:14px;align-items:flex-start}
.step::before{counter-increment:s;content:counter(s);flex:none;width:26px;height:26px;border-radius:50%;
  background:var(--rose-tint);color:var(--rose-deep);font-weight:700;font-size:13px;display:grid;place-items:center;margin-top:2px}
.step p{margin:0;font-size:14.5px}
.step .mdl{font-family:'Fraunces';font-style:italic;color:var(--rose-deep)}

/* SPEAKING blocks — coração do método */
.speak{background:var(--ink);color:#fff;border-radius:16px;padding:20px;margin-bottom:14px}
.speak .top{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.speak .lbl{font-family:'Fraunces';font-weight:600;font-size:18px}
.timer{margin-left:auto;display:flex;align-items:center;gap:10px}
.timer .t{font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;color:var(--gold);min-width:46px}
.timer button{background:var(--rose);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:13px}
.timer button:hover{background:var(--rose-deep)}
.speak .prompt{font-size:15px;color:#EDE7F0}
.speak .model{margin-top:10px;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 13px;
  font-family:'Fraunces';font-style:italic;font-size:14.5px;color:#F2D9A8}

/* atividade principal */
.main-act{background:var(--rose-tint);border:1px solid #EBC9D4;border-radius:16px;padding:20px 22px}
.main-act h4{font-family:'Fraunces';font-size:18px;margin:0 0 6px;color:var(--rose-deep)}
.main-act p{margin:.2em 0;font-size:14.5px;color:#6E3349}

/* gramática rebaixada */
.gram details{background:#F6F2EC;border:1px solid var(--line);border-radius:12px;padding:2px 16px}
.gram summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);padding:12px 0;list-style:none;
  display:flex;align-items:center;gap:8px}
.gram summary::-webkit-details-marker{display:none}
.gram summary::before{content:'▸';color:var(--gold);transition:.2s}
.gram details[open] summary::before{transform:rotate(90deg)}
.gram .gbody{font-style:italic;color:#7A7286;font-size:13.5px;padding:0 0 14px;line-height:1.7}
.gram .gbody b{color:#5A5368;font-style:normal}

/* homepractice + sucesso */
.hw{display:flex;flex-direction:column;gap:8px}
.hw li{list-style:none;display:flex;gap:10px;align-items:flex-start;font-size:14.5px}
.hw li::before{content:'✎';color:var(--gold);flex:none}
.success{background:var(--sage-tint);border:1px solid #C9DDD2;border-radius:16px;padding:20px 22px}
.success h4{font-family:'Fraunces';color:#3F6152;margin:0 0 12px;font-size:18px}
.check{display:flex;flex-direction:column;gap:9px}
.check label{display:flex;gap:11px;align-items:flex-start;font-size:14.5px;cursor:pointer}
.check input{margin-top:3px;width:17px;height:17px;accent-color:var(--sage);flex:none}
.success .hand{font-size:20px;color:var(--sage);display:block;margin-top:12px}

.finish{margin-top:30px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn-done{background:var(--sage);color:#fff;border:none;border-radius:12px;padding:14px 24px;
  font-weight:700;font-size:15px;box-shadow:var(--shadow);transition:.2s}
.btn-done:hover{background:#5A7567;transform:translateY(-2px)}
.btn-done:disabled{background:#C4CBC6;cursor:not-allowed;box-shadow:none;transform:none}
.finish .msg{font-size:14px;color:var(--ink-soft)}
.btn-next{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:14px 22px;font-weight:700;font-size:15px}
.btn-next:hover{background:#332C44}

/* skeleton banner */
.wip{background:#FFF6E5;border:1px dashed var(--gold);border-radius:12px;padding:12px 16px;
  font-size:13.5px;color:#8A5E1E;margin-top:20px}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);
  color:#fff;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:.35s;z-index:100;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{border-top:1px solid var(--line);padding:26px 0;color:var(--ink-soft);font-size:12.5px;text-align:center}

@media (max-width:540px){@media (max-width: 540px) {
  /* 1. Margens gerais (ganha 12px de largura útil na tela) */
  .wrap { padding: 0 16px; }

  /* 2. Barra Superior mais fina */
  .topbar .wrap { height: auto; padding: 8px 16px; gap: 10px; flex-wrap: wrap; }
  .mark { font-size: 17px; }
  .progress-mini { order: 3; max-width: 100%; width: 100%; margin-top: 2px; }

  /* 3. Textos da Home (Hero) */
  .hero { padding: 28px 0 10px; }
  .hero h1 { font-size: 26px; } /* O original travava em 30px */
  .hero .sub { font-size: 14.5px; }
  .hero .note { font-size: 19px; }

  /* 4. Cards da Trilha (~15% mais compactos) */
  .grid { gap: 13px; padding-bottom: 50px; }
  .chunk { 
    padding: 16px 16px 14px; 
    min-height: 148px; /* O original era 182px */
    gap: 8px; 
  }
  .chunk .num { top: -11px; left: 14px; width: 33px; height: 33px; font-size: 14px; }
  .chunk h3 { font-size: 17px; }
  .chunk .cando { font-size: 12.5px; }

  /* 5. Dentro da Aula (Lesson View) */
  .l-head h2 { font-size: 24px; }
  .b-label h3 { font-size: 18px; }
  .b-label .ic { width: 26px; height: 26px; font-size: 13px; }
  
  /* Caixas de conteúdo e exercícios */
  .card-soft, .speak, .main-act, .success, .review { padding: 15px; }
  .speak .lbl { font-size: 16px; }
  .timer .t { font-size: 16px; }
  
  /* Botões principais do rodapé da aula */
  .btn-done, .btn-next { padding: 12px 18px; font-size: 14px; }
}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* ================= VISUAL PREMIUM · ENGLISH BY NEVES ================= */

    radial-gradient(circle at 12% 8%, rgba(199,91,122,.10), transparent 28%),
    radial-gradient(circle at 90% 5%, rgba(224,164,88,.13), transparent 24%),
    linear-gradient(180deg,#FFFDFB 0%,#FBF7F2 58%,#F8F1EA 100%);

}

}

  background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;
  box-shadow:0 10px 26px -22px rgba(31,27,46,.42);text-decoration:none
}

  min-height:250px;border-radius:30px;
  background:
    radial-gradient(circle at 78% 18%, rgba(224,164,88,.34), transparent 28%),
    radial-gradient(circle at 18% 88%, rgba(199,91,122,.28), transparent 30%),
    linear-gradient(135deg,#1F1B2E 0%,#342845 50%,#1F1B2E 100%);
  box-shadow:0 28px 70px -42px rgba(31,27,46,.80);
  border:1px solid rgba(255,255,255,.10);
}
body.visual-premium .l-banner::before{
  content:"Real-life English Method";
  position:absolute;right:22px;top:18px;z-index:4;
  color:rgba(255,255,255,.78);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:7px 11px;
}
body.visual-premium .l-banner-copy{padding:34px 28px 34px 38px}
body.visual-premium .l-banner-copy .btag{
  width:fit-content;color:#1F1B2E;background:var(--gold);border-radius:999px;padding:7px 12px;
}
body.visual-premium .l-banner-copy h2{font-size:clamp(30px,4.7vw,46px);max-width:10ch;line-height:.98}
body.visual-premium .l-banner-art svg{filter:drop-shadow(0 20px 30px rgba(0,0,0,.18))}
body.visual-premium .l-obj{
  background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;
  padding:18px 20px;margin:22px 0 12px;box-shadow:0 18px 48px -36px rgba(31,27,46,.42);
}
body.visual-premium section.block{
  background:rgba(255,255,255,.58);border:1px solid rgba(233,223,212,.72);
  border-radius:24px;padding:20px;margin-top:22px;
  box-shadow:0 18px 52px -45px rgba(31,27,46,.50);
}
body.visual-premium .b-label{margin-bottom:12px}
body.visual-premium .b-label .ic{
  width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--rose-tint),#fff);
  border:1px solid #EBC9D4;box-shadow:0 12px 26px -22px rgba(199,91,122,.65)
}
body.visual-premium .b-label h3{font-size:22px}
body.visual-premium .b-label .hint{background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-style:normal}
body.visual-premium .card-soft,
body.visual-premium .ph,
body.visual-premium .review,
body.visual-premium .success,
body.visual-premium .main-act{
  border-radius:18px;background:#fff;border:1px solid rgba(233,223,212,.95);
  box-shadow:0 16px 40px -34px rgba(31,27,46,.45);
}
body.visual-premium .review{
  background:linear-gradient(135deg,#FFF8E9,#FFFFFF);
  border:1px solid #E8CB92;
}
body.visual-premium .vocab{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
body.visual-premium .vcard{
  background:#fff;color:var(--ink);border:1px solid rgba(233,223,212,.95);border-radius:18px;
  min-height:86px;box-shadow:0 16px 38px -32px rgba(31,27,46,.48);
}
body.visual-premium .vcard:hover{border-color:#EBC9D4;transform:translateY(-4px)}
body.visual-premium .vcard .en{color:var(--rose-deep);font-size:19px}
body.visual-premium .vcard .pt{color:#fff}
body.visual-premium .vcard.flip{background:linear-gradient(135deg,var(--rose),var(--rose-deep));border-color:transparent;color:#fff}
body.visual-premium .ph{border-left:0;padding:14px 16px;position:relative;overflow:hidden}
body.visual-premium .ph::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(var(--rose),var(--gold))}
body.visual-premium .ph .en{font-size:18px}
body.visual-premium .ph .say{border-radius:999px;background:var(--rose-tint);border-color:#EBC9D4;color:var(--rose-deep)}
body.visual-premium .step::before{background:linear-gradient(135deg,var(--rose),var(--rose-deep));color:#fff;box-shadow:0 10px 20px -15px rgba(168,52,90,.85)}
body.visual-premium .speak{
  border-radius:24px;padding:24px;
  background:
    radial-gradient(circle at 88% 12%,rgba(224,164,88,.26),transparent 30%),
    linear-gradient(135deg,#1F1B2E,#342845);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 24px 66px -42px rgba(31,27,46,.85);
}
body.visual-premium .speak .lbl{font-size:21px;color:#fff}
body.visual-premium .speak .top::before{
  content:"Speaking challenge";font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  color:#1F1B2E;background:var(--gold);border-radius:999px;padding:6px 10px;order:-1;
}
body.visual-premium .timer{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 6px 5px 12px}
body.visual-premium .timer button{border-radius:999px;background:linear-gradient(135deg,var(--rose),var(--rose-deep))}
body.visual-premium .speak .model{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.08)}
body.visual-premium .main-act{
  background:linear-gradient(135deg,#FFF,#FDF4F7);border:1px solid #EBC9D4;padding:22px 24px;position:relative;overflow:hidden;
}
body.visual-premium .main-act::before{
  content:"Desafio da aula";display:inline-block;margin-bottom:8px;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  color:var(--rose-deep);background:var(--rose-tint);border-radius:999px;padding:6px 10px;
}
body.visual-premium .main-act h4{font-size:22px}
body.visual-premium .gram details{background:#fff;border-radius:18px}
body.visual-premium .hw li{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
body.visual-premium .hw li::before{content:'✓';font-weight:900;color:var(--sage)}
body.visual-premium .success{
  background:linear-gradient(135deg,#F3FAF6,#FFFFFF);border-color:#C9DDD2;padding:24px;
}
body.visual-premium .success h4{font-size:22px}
body.visual-premium .check label{background:#fff;border:1px solid #DDEBE3;border-radius:14px;padding:12px 14px}
body.visual-premium .finish{
  background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px 18px;box-shadow:0 16px 46px -36px rgba(31,27,46,.45);
}
body.visual-premium .btn-done,
body.visual-premium .btn-next{border-radius:999px;box-shadow:0 14px 34px -24px rgba(31,27,46,.65)}
body.visual-premium .btn-done{background:linear-gradient(135deg,var(--sage),#5A7567)}
@media(max-width:640px){
  body.visual-premium .topbar .wrap{height:auto;padding-top:8px;padding-bottom:8px}
  body.visual-premium .l-banner::before{position:relative;display:inline-block;right:auto;top:auto;margin:18px 18px 0}
  body.visual-premium .l-banner-copy{padding:18px 18px 24px}
  body.visual-premium .l-banner-copy h2{font-size:32px;max-width:none}
  body.visual-premium section.block{padding:16px;border-radius:20px}
  body.visual-premium .timer{margin-left:0;width:100%;justify-content:space-between}
}

/* Ajustes específicos da marca */
body.visual-premium .mark .logo-img{
  height:62px;
  max-width:160px;
  object-fit:contain;
  display:block;
}
body.visual-premium .topbar .wrap{height:82px}
body.visual-premium .hero-cta{
  border:none;
  text-decoration:none;
  transition:transform .18s ease, box-shadow .18s ease;
}
body.visual-premium .hero-cta:hover{transform:translateY(-2px);box-shadow:0 18px 40px -14px rgba(199,91,122,.70)}
body.visual-premium .chunk{
  box-shadow:0 16px 42px -38px rgba(31,27,46,.55);
}
body.visual-premium .chunk:not(.locked):hover{
  transform:translateY(-5px);
  box-shadow:0 22px 56px -36px rgba(31,27,46,.55);
}
@media(max-width:640px){
  body.visual-premium .mark .logo-img{height:54px;max-width:140px}
  body.visual-premium .topbar .wrap{height:auto}
}

</style>

  get(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return mem[k]}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){mem[k]=v}}
};
let done = store.get(KEY) || {}; // {1:true,2:true,...}

const $=s=>document.querySelector(s);
const home=$('#home'), lessonView=$('#lessonView'), trilha=$('#trilha');

function isDone(n){return !!done[n]}
function isUnlocked(n){return n===1 || isDone(n-1)}
function status(n){return isDone(n)?'done':(isUnlocked(n)?'open':'locked')}

function updateProgress(){
  const total=LESSONS.length, d=LESSONS.filter(l=>isDone(l.n)).length;
  const pct=Math.round(d/total*100);
  $('#barFill').style.width=pct+'%';
  $('#barPct').textContent=pct+'%';
}

function renderTrilha(){
  trilha.innerHTML='';
  const tones=[
    {bg:'var(--gold-tint)',fg:'#9A6A1E'},
    {bg:'var(--rose-tint)',fg:'#A8345A'},
    {bg:'var(--sage-tint)',fg:'#3F6152'}
  ];
  LESSONS.forEach((l,i)=>{
    const st=status(l.n);
    const tone=tones[i%3];
    const b=document.createElement('button');
    b.className='chunk '+st;
    const pill = st==='done'?'<span class="pill ok">✓ Concluída</span>'
              : st==='open'?'<span class="pill go">▶ Disponível</span>'
              : '<span class="pill lock">🔒 Bloqueada</span>';
    b.innerHTML=`
      <span class="num">${l.n}</span>
      <span class="stamp">você conseguiu! ✦</span>
      <div class="art" style="background:${tone.bg}">
        <svg viewBox="0 0 96 96" fill="none"><circle cx="48" cy="48" r="40" fill="${tone.fg}" opacity=".18"/>
          <path d="M28 34h40a6 6 0 0 1 6 6v18a6 6 0 0 1-6 6H46l-14 12v-12h-4a6 6 0 0 1-6-6V40a6 6 0 0 1 6-6Z" fill="${tone.fg}"/></svg>
      </div>
      <div class="body">
        <span class="tag">${l.tag}</span>
        <h3>${l.title}</h3>
        <p class="cando">${l.cando}</p>
        ${pill}
      </div>`;
    b.addEventListener('click',()=>{
      if(st==='locked'){ b.classList.add('shake'); setTimeout(()=>b.classList.remove('shake'),420);
        toast('🔒 Conclua a aula anterior pra desbloquear.'); return; }
      openLesson(l.n);
    });
    trilha.appendChild(b);
  });
  updateProgress();
}

function openLesson(n){

  const reviewHTML = l.review ? `

       ${l.review.map(r=>`<div style="margin:.4em 0 .2em;font-size:12px;font-weight:700;color:#9A6A1E">${r.from}</div>

    </div>
    ${reviewHTML}
    ${l.warmup?`<section class="block"><div class="b-label"><span class="ic">☀️</span><h3>Warm-up</h3></div><div class="card-soft"><p>${l.warmup}</p></div></section>`:''}
    ${vocabHTML}${phrasesHTML}${guidedHTML}${speakHTML}${mainHTML}${gramHTML}${hwHTML}${successHTML}
    ${wipHTML}
    ${finishHTML}`;

  // back
  $('#back').addEventListener('click',goHome);
  // vocab flip
  lessonView.querySelectorAll('.vcard').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('flip')));
  // timers
  lessonView.querySelectorAll('.timer button').forEach(btn=>{
    btn.addEventListener('click',()=>startTimer(btn));
  });
  // success gating
  const chks=[...lessonView.querySelectorAll('.succhk')];
  const markBtn=$('#markDone'), msg=$('#finishMsg');
  function refresh(){
    const all = chks.length>0 && chks.every(c=>c.checked);
    markBtn.disabled=!all;
    msg.textContent = isDone(n) ? 'Aula já concluída ✓ — pode revisar à vontade.'
                    : all ? 'Tudo pronto! Pode concluir.' : 'Marque os critérios de sucesso acima pra liberar.';
  }
  chks.forEach(c=>c.addEventListener('change',refresh));
  if(isDone(n)){ chks.forEach(c=>c.checked=true); }
  refresh();
  markBtn.addEventListener('click',()=>{
    done[n]=true; store.set(KEY,done);
    refresh(); renderNext(n); updateProgress();
    toast(next?`✓ Aula ${n} concluída! Aula ${n+1} liberada.`:'✓ Você concluiu o A0! 🎉');
    confettiStamp();
  });
  renderNext(n);
}

function renderNext(n){
  const slot=$('#nextSlot'); if(!slot) return;
  const next=LESSONS.find(x=>x.n===n+1);
  if(isDone(n) && next){
    slot.innerHTML=`<button class="btn-next" id="goNext">Ir pra Aula ${next.n}: ${next.title} →</button>`;
    $('#goNext').addEventListener('click',()=>openLesson(next.n));
  } else { slot.innerHTML=''; }
}

let activeTimer=null;
function startTimer(btn){
  if(activeTimer){clearInterval(activeTimer.id); activeTimer.btn.textContent='▶ '+activeTimer.sec+'s';}
  let sec=+btn.dataset.sec, left=sec;
  const t=document.getElementById(btn.dataset.tid);
  btn.textContent='■ stop';
  const tick=()=>{ t.textContent='0:'+String(left).padStart(2,'0');
    if(left<=0){clearInterval(id); btn.textContent='✓ feito'; t.textContent='0:00'; activeTimer=null; return;}
    left--; };
  tick(); const id=setInterval(tick,1000);
  activeTimer={id,btn,sec};
  btn.onclick=()=>{clearInterval(id); btn.textContent='▶ '+sec+'s'; t.textContent='0:'+String(sec).padStart(2,'0'); activeTimer=null;
    btn.onclick=null; btn.addEventListener('click',()=>startTimer(btn));};
}

function goHome(){
  lessonView.style.display='none';
  home.style.display='block';
  renderTrilha();
  window.scrollTo({top:0});
}

function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);
}
function confettiStamp(){ /* leve: o stamp já aparece no card ao voltar */ }

$('#resetBtn').addEventListener('click',()=>{
  if(confirm('Zerar todo o progresso? (use isso pra reaproveitar o material com outro aluno)')){
    done={}; store.set(KEY,done); goHome(); toast('Progresso zerado.');
  }
});

const continueBtn=document.getElementById('continueBtn');
if(continueBtn){
  continueBtn.addEventListener('click',()=>{
    const nextLesson = LESSONS.find(l=>!isDone(l.n) && isUnlocked(l.n)) || LESSONS[0];
    openLesson(nextLesson.n);
  });
}

renderTrilha();
</script>
</body>
</html>
